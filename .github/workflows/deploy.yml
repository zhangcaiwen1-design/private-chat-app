name: Deploy to Server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect deploy scope
        id: deploy_scope
        run: |
          CHANGED_FILES="$(git diff --name-only HEAD^ HEAD || true)"
          echo "$CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -Ev '^(backend/|\.github/workflows/deploy.yml$)' | grep -q .; then
            echo "build_apk=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_apk=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        if: steps.deploy_scope.outputs.build_apk == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        if: steps.deploy_scope.outputs.build_apk == 'true'
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        if: steps.deploy_scope.outputs.build_apk == 'true'
        run: npm ci

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Build Android APK
        if: steps.deploy_scope.outputs.build_apk == 'true'
        env:
          NODE_ENV: production
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare deploy artifacts
        run: |
          mkdir -p deploy-artifacts/site/download
          if [ "${{ steps.deploy_scope.outputs.build_apk }}" = "true" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk deploy-artifacts/site/download/latest.apk
            cp app-version.json deploy-artifacts/site/app-version.json
            cp docs/privatechat-landing-page.html deploy-artifacts/site/index.html
          fi

      - name: Upload deploy bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "backend,deploy-artifacts/site"
          target: "/tmp/private-chat-deploy-${{ github.sha }}"
          rm: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          debug: true
          script_stop: true
          script: |
            set -e

            DEPLOY_DIR="/tmp/private-chat-deploy-${{ github.sha }}"
            APP_DIR="/opt/privatechat-backend"
            WEB_ROOT="/www/wwwroot/privatechat.yifan1.com"

            mkdir -p "$APP_DIR/data" "$APP_DIR/uploads" "$WEB_ROOT/download"

            EXISTING_ADMIN_KEY=""
            if [ -f "$APP_DIR/.env" ]; then
              EXISTING_ADMIN_KEY="$(sed -n 's/^ADMIN_MEMBERSHIP_KEY=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_APP_ID="$(sed -n 's/^WECHAT_MINIPROGRAM_APP_ID=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_APP_SECRET="$(sed -n 's/^WECHAT_MINIPROGRAM_APP_SECRET=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_OFFER_ID="$(sed -n 's/^WECHAT_VIRTUAL_PAY_OFFER_ID=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_APP_KEY="$(sed -n 's/^WECHAT_VIRTUAL_PAY_APP_KEY=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_ENV="$(sed -n 's/^WECHAT_VIRTUAL_PAY_ENV=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_CURRENCY="$(sed -n 's/^WECHAT_VIRTUAL_PAY_CURRENCY=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_ZONE_ID="$(sed -n 's/^WECHAT_VIRTUAL_PAY_ZONE_ID=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_PRODUCT_FIRST_MONTH_19_9="$(sed -n 's/^WECHAT_VIRTUAL_PAY_PRODUCT_FIRST_MONTH_19_9=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_PRODUCT_MONTHLY_39_9="$(sed -n 's/^WECHAT_VIRTUAL_PAY_PRODUCT_MONTHLY_39_9=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_PRODUCT_QUARTERLY_99="$(sed -n 's/^WECHAT_VIRTUAL_PAY_PRODUCT_QUARTERLY_99=//p' "$APP_DIR/.env" | tail -n 1 || true)"
              EXISTING_WECHAT_PRODUCT_ANNUAL_299="$(sed -n 's/^WECHAT_VIRTUAL_PAY_PRODUCT_ANNUAL_299=//p' "$APP_DIR/.env" | tail -n 1 || true)"
            fi
            SECRET_ADMIN_KEY='${{ secrets.ADMIN_MEMBERSHIP_KEY }}'
            SECRET_WECHAT_APP_ID='${{ secrets.WECHAT_MINIPROGRAM_APP_ID }}'
            SECRET_WECHAT_APP_SECRET='${{ secrets.WECHAT_MINIPROGRAM_APP_SECRET }}'
            SECRET_WECHAT_OFFER_ID='${{ secrets.WECHAT_VIRTUAL_PAY_OFFER_ID }}'
            SECRET_WECHAT_APP_KEY='${{ secrets.WECHAT_VIRTUAL_PAY_APP_KEY }}'
            SECRET_WECHAT_ENV='${{ secrets.WECHAT_VIRTUAL_PAY_ENV }}'
            SECRET_WECHAT_CURRENCY='${{ secrets.WECHAT_VIRTUAL_PAY_CURRENCY }}'
            SECRET_WECHAT_ZONE_ID='${{ secrets.WECHAT_VIRTUAL_PAY_ZONE_ID }}'
            SECRET_WECHAT_PRODUCT_FIRST_MONTH_19_9='${{ secrets.WECHAT_VIRTUAL_PAY_PRODUCT_FIRST_MONTH_19_9 }}'
            SECRET_WECHAT_PRODUCT_MONTHLY_39_9='${{ secrets.WECHAT_VIRTUAL_PAY_PRODUCT_MONTHLY_39_9 }}'
            SECRET_WECHAT_PRODUCT_QUARTERLY_99='${{ secrets.WECHAT_VIRTUAL_PAY_PRODUCT_QUARTERLY_99 }}'
            SECRET_WECHAT_PRODUCT_ANNUAL_299='${{ secrets.WECHAT_VIRTUAL_PAY_PRODUCT_ANNUAL_299 }}'
            ADMIN_MEMBERSHIP_KEY="${SECRET_ADMIN_KEY:-$EXISTING_ADMIN_KEY}"
            ADMIN_MEMBERSHIP_KEY="${ADMIN_MEMBERSHIP_KEY:-change-me-admin-key}"
            WECHAT_MINIPROGRAM_APP_ID="${SECRET_WECHAT_APP_ID:-$EXISTING_WECHAT_APP_ID}"
            WECHAT_MINIPROGRAM_APP_SECRET="${SECRET_WECHAT_APP_SECRET:-$EXISTING_WECHAT_APP_SECRET}"
            WECHAT_VIRTUAL_PAY_OFFER_ID="${SECRET_WECHAT_OFFER_ID:-$EXISTING_WECHAT_OFFER_ID}"
            WECHAT_VIRTUAL_PAY_APP_KEY="${SECRET_WECHAT_APP_KEY:-$EXISTING_WECHAT_APP_KEY}"
            WECHAT_VIRTUAL_PAY_ENV="${SECRET_WECHAT_ENV:-$EXISTING_WECHAT_ENV}"
            WECHAT_VIRTUAL_PAY_CURRENCY="${SECRET_WECHAT_CURRENCY:-$EXISTING_WECHAT_CURRENCY}"
            WECHAT_VIRTUAL_PAY_ZONE_ID="${SECRET_WECHAT_ZONE_ID:-$EXISTING_WECHAT_ZONE_ID}"
            WECHAT_VIRTUAL_PAY_PRODUCT_FIRST_MONTH_19_9="${SECRET_WECHAT_PRODUCT_FIRST_MONTH_19_9:-$EXISTING_WECHAT_PRODUCT_FIRST_MONTH_19_9}"
            WECHAT_VIRTUAL_PAY_PRODUCT_MONTHLY_39_9="${SECRET_WECHAT_PRODUCT_MONTHLY_39_9:-$EXISTING_WECHAT_PRODUCT_MONTHLY_39_9}"
            WECHAT_VIRTUAL_PAY_PRODUCT_QUARTERLY_99="${SECRET_WECHAT_PRODUCT_QUARTERLY_99:-$EXISTING_WECHAT_PRODUCT_QUARTERLY_99}"
            WECHAT_VIRTUAL_PAY_PRODUCT_ANNUAL_299="${SECRET_WECHAT_PRODUCT_ANNUAL_299:-$EXISTING_WECHAT_PRODUCT_ANNUAL_299}"

            find "$APP_DIR" -mindepth 1 -maxdepth 1 \
              ! -name data \
              ! -name uploads \
              ! -name node_modules \
              -exec rm -rf {} +

            cp -a "$DEPLOY_DIR/backend/." "$APP_DIR/"
            cat > "$APP_DIR/.env" << EOF
            PORT=3001
            NODE_ENV=production
            DB_PATH=$APP_DIR/data/app.db
            UPLOAD_DIR=$APP_DIR/uploads
            ADMIN_MEMBERSHIP_KEY=$ADMIN_MEMBERSHIP_KEY
            WECHAT_MINIPROGRAM_APP_ID=$WECHAT_MINIPROGRAM_APP_ID
            WECHAT_MINIPROGRAM_APP_SECRET=$WECHAT_MINIPROGRAM_APP_SECRET
            WECHAT_VIRTUAL_PAY_OFFER_ID=$WECHAT_VIRTUAL_PAY_OFFER_ID
            WECHAT_VIRTUAL_PAY_APP_KEY=$WECHAT_VIRTUAL_PAY_APP_KEY
            WECHAT_VIRTUAL_PAY_ENV=${WECHAT_VIRTUAL_PAY_ENV:-0}
            WECHAT_VIRTUAL_PAY_CURRENCY=${WECHAT_VIRTUAL_PAY_CURRENCY:-CNY}
            WECHAT_VIRTUAL_PAY_ZONE_ID=$WECHAT_VIRTUAL_PAY_ZONE_ID
            WECHAT_VIRTUAL_PAY_PRODUCT_FIRST_MONTH_19_9=$WECHAT_VIRTUAL_PAY_PRODUCT_FIRST_MONTH_19_9
            WECHAT_VIRTUAL_PAY_PRODUCT_MONTHLY_39_9=$WECHAT_VIRTUAL_PAY_PRODUCT_MONTHLY_39_9
            WECHAT_VIRTUAL_PAY_PRODUCT_QUARTERLY_99=$WECHAT_VIRTUAL_PAY_PRODUCT_QUARTERLY_99
            WECHAT_VIRTUAL_PAY_PRODUCT_ANNUAL_299=$WECHAT_VIRTUAL_PAY_PRODUCT_ANNUAL_299
            EOF

            cd "$APP_DIR"
            npm ci --omit=dev

            if command -v fuser >/dev/null 2>&1; then
              fuser -k 3001/tcp || true
            else
              ps -eo pid=,comm=,args= \
                | awk '$2 == "node" && (index($0, "/opt/privatechat-backend/server.js") || index($0, "node server.js")) {print $1}' \
                | xargs -r kill
            fi
            sleep 5
            nohup npm start > backend.log 2>&1 &

            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3001/health; then
                break
              fi
              sleep 1
            done

            curl -fsS http://127.0.0.1:3001/health || {
              echo "Backend failed to start. Last backend.log lines:"
              tail -n 200 backend.log || true
              exit 1
            }

            if [ -f "$DEPLOY_DIR/deploy-artifacts/site/app-version.json" ]; then
              cp "$DEPLOY_DIR/deploy-artifacts/site/app-version.json" "$WEB_ROOT/app-version.json"
              chmod 644 "$WEB_ROOT/app-version.json"
            fi
            if [ -f "$DEPLOY_DIR/deploy-artifacts/site/download/latest.apk" ]; then
              cp "$DEPLOY_DIR/deploy-artifacts/site/download/latest.apk" "$WEB_ROOT/download/latest.apk"
              chmod 644 "$WEB_ROOT/download/latest.apk"
            fi
            if [ -f "$DEPLOY_DIR/deploy-artifacts/site/index.html" ]; then
              cp "$DEPLOY_DIR/deploy-artifacts/site/index.html" "$WEB_ROOT/index.html"
              chmod 644 "$WEB_ROOT/index.html"
            fi

            rm -rf "$DEPLOY_DIR"

            echo "PrivateChatApp deployed successfully."
