name: Deploy to Server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Create environment file
        run: |
          cd backend
          cat > .env << EOF
          PORT=3001
          NODE_ENV=production
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          UPLOAD_DIR=/home/admin/private-chat/uploads
          RDS_HOST=${{ secrets.RDS_HOST }}
          RDS_PORT=3306
          RDS_DB=${{ secrets.RDS_DB }}
          RDS_USER=${{ secrets.RDS_USER }}
          RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
          EOF

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/admin/private-chat

            # 创建目录
            mkdir -p /home/admin/private-chat
            mkdir -p /home/admin/private-chat/uploads

            # 停止旧服务
            pkill -f "node.*server.js" || true
            sleep 2

            # 复制新代码
            cp -r ${{ github.workspace }}/backend/* .

            # 安装依赖
            npm install

            # 重启后端
            nohup npm start > backend.log 2>&1 &

            sleep 3

            # 检查是否启动成功
            if curl -s http://localhost:3001/health > /dev/null; then
              echo "PrivateChatApp deployed successfully!"
            else
              echo "Deployment failed, check backend.log"
              cat backend.log
              exit 1
            fi
