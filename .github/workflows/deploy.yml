name: Deploy to Server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Build Android APK
        env:
          NODE_ENV: production
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare deploy artifacts
        run: |
          mkdir -p deploy-artifacts/site/download
          cp android/app/build/outputs/apk/release/app-release.apk deploy-artifacts/site/download/latest.apk
          cp app-version.json deploy-artifacts/site/app-version.json
          cp docs/privatechat-download-page.html deploy-artifacts/site/index.html

      - name: Upload deploy bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "backend,deploy-artifacts/site"
          target: "/tmp/private-chat-deploy-${{ github.sha }}"
          rm: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          debug: true
          script_stop: true
          script: |
            set -e

            DEPLOY_DIR="/tmp/private-chat-deploy-${{ github.sha }}"
            APP_DIR="/opt/privatechat-backend"
            WEB_ROOT="/www/wwwroot/privatechat.yifan1.com"

            mkdir -p "$APP_DIR/data" "$APP_DIR/uploads" "$WEB_ROOT/download"

            EXISTING_ADMIN_KEY=""
            if [ -f "$APP_DIR/.env" ]; then
              EXISTING_ADMIN_KEY="$(sed -n 's/^ADMIN_MEMBERSHIP_KEY=//p' "$APP_DIR/.env" | tail -n 1 || true)"
            fi
            SECRET_ADMIN_KEY='${{ secrets.ADMIN_MEMBERSHIP_KEY }}'
            ADMIN_MEMBERSHIP_KEY="${SECRET_ADMIN_KEY:-$EXISTING_ADMIN_KEY}"
            ADMIN_MEMBERSHIP_KEY="${ADMIN_MEMBERSHIP_KEY:-change-me-admin-key}"

            find "$APP_DIR" -mindepth 1 -maxdepth 1 \
              ! -name data \
              ! -name uploads \
              ! -name node_modules \
              -exec rm -rf {} +

            cp -a "$DEPLOY_DIR/backend/." "$APP_DIR/"
            cat > "$APP_DIR/.env" << EOF
            PORT=3001
            NODE_ENV=production
            DB_PATH=$APP_DIR/data/app.db
            UPLOAD_DIR=$APP_DIR/uploads
            ADMIN_MEMBERSHIP_KEY=$ADMIN_MEMBERSHIP_KEY
            EOF

            cd "$APP_DIR"
            npm install --omit=dev

            ps -eo pid=,comm=,args= \
              | awk '$2 == "node" && index($0, "/opt/privatechat-backend/server.js") {print $1}' \
              | xargs -r kill
            sleep 2
            nohup npm start > backend.log 2>&1 &

            sleep 3

            curl -fsS http://127.0.0.1:3001/health

            cp "$DEPLOY_DIR/deploy-artifacts/site/app-version.json" "$WEB_ROOT/app-version.json"
            cp "$DEPLOY_DIR/deploy-artifacts/site/download/latest.apk" "$WEB_ROOT/download/latest.apk"
            cp "$DEPLOY_DIR/deploy-artifacts/site/index.html" "$WEB_ROOT/index.html"
            chmod 644 "$WEB_ROOT/app-version.json" "$WEB_ROOT/download/latest.apk" "$WEB_ROOT/index.html"

            rm -rf "$DEPLOY_DIR"

            echo "PrivateChatApp deployed successfully."
