function avgScore(project){const vals=Object.values(project.scores);return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10}
function projectProgress(project){return Math.min(95, Math.round(avgScore(project)*8 + (project.priority === 'P0' ? 10 : 0)))}
function priorityClass(priority){return priority === 'P0' ? 'p0' : priority === 'P1' ? 'p1' : 'p2'}
function displayPriority(project){return project.priorityDisplay||project.priority}
function trackNames(project){return (project.tracks||[]).map(id=>{const t=data.lifecycleTracks.find(x=>x.id===id);return t?t.name:id})}
function projectName(id){const p=data.projects.find(x=>x.id===id);return p?p.name:id}
function render(){document.getElementById('philosophyText').textContent=data.philosophy.headline+' '+data.philosophy.principles.join(' ');renderDailyDashboard();renderProjects();renderDetail();renderModules()}
function renderDailyDashboard(){const d=data.dailyDashboard;document.getElementById('dailyDashboard').innerHTML=`<div><span class="pill money">${d.moneyProject.title}</span><b>${projectName(d.moneyProject.projectId)}</b><small>${d.moneyProject.summary}</small><small><b>下一步：</b>${d.moneyProject.nextAction}</small></div><div><span class="pill warn">${d.blockedItem.title}</span><b>${projectName(d.blockedItem.projectId)}</b><small>${d.blockedItem.summary}</small><small><b>下一步：</b>${d.blockedItem.nextAction}</small></div><div><span class="pill p1">${d.claudeTasks.title}</span>${d.claudeTasks.items.map(item=>`<small><b>${projectName(item.projectId)}：</b>${item.text}</small>`).join('')}</div><div><span class="pill p2">${d.watchProjects.title}</span>${d.watchProjects.items.map(item=>`<small><b>${projectName(item.projectId)}：</b>${item.text}</small>`).join('')}</div>`}
function renderProjects(){document.getElementById('projectGrid').innerHTML=data.projects.map(p=>`<article class="project ${p.id===selectedId?'active':''}" onclick="selectProject('${p.id}')"><span class="pill ${priorityClass(p.priority)}">${displayPriority(p)}</span><h2>${p.name}</h2><p>${p.summary}</p><div class="meta"><span class="pill p2">${p.category}</span><span class="pill ok">均分 ${avgScore(p)}</span>${trackNames(p).map(name=>`<span class="pill track">${name}</span>`).join('')}</div><div class="progress"><span style="width:${projectProgress(p)}%"></span></div><div class="actionline"><b>下一步：</b>${p.nextSmallAction||p.currentFocus}</div><div class="actions">${p.subflows.map(s=>`<a class="btn" href="${s.href}" onclick="event.stopPropagation()">${s.name}</a>`).join('') || '<span class="btn">子工作流待创建</span>'}</div></article>`).join('')}
function renderDetail(){const p=data.projects.find(x=>x.id===selectedId);document.getElementById('detailTitle').textContent=p.name+' · 项目详情';document.getElementById('projectDetail').innerHTML=`<b>${p.stage}</b><p>${p.summary}</p><div class="flags"><span class="pill ${priorityClass(p.priority)}">${displayPriority(p)}</span><span class="pill money">离钱距离：${p.moneyDistance}</span><span class="pill ${p.requiresUserAction?'warn':'ok'}">用户动作：${p.requiresUserAction?'需要':'暂不需要'}</span><span class="pill ${p.claudeCanAdvance?'ok':'warn'}">Claude：${p.claudeCanAdvance?'可推进':'等待输入'}</span></div><p><b>创始人熟悉度：</b>${p.founderFit}</p><p><b>当前重点：</b>${p.currentFocus}</p><p><b>下一步最小动作：</b>${p.nextSmallAction||p.currentFocus}</p><p><b>阻塞点：</b></p><ul>${p.blockers.map(b=>`<li>${b}</li>`).join('')}</ul>`;document.getElementById('scoreList').innerHTML=data.scoreDimensions.map(dim=>{const v=p.scores[dim.id];return `<div class="score-row"><span>${dim.name}</span><div class="scorebar"><span style="width:${v*10}%"></span></div><b>${v}</b></div>`}).join('')}
function renderModules(){document.getElementById('workflowModules').innerHTML=data.lifecycleTracks.map((track,i)=>`<div class="module"><b>${i+1}. ${track.name}</b><p class="sub">${track.purpose}</p><ul>${track.outputs.map(output=>`<li>${output}</li>`).join('')}</ul></div>`).join('')}
function selectProject(id){selectedId=id;localStorage.setItem('portfolio.selectedProject',id);render()}
render();
</script>
</body>
</html>
