<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#47474D"/>
      <stop offset="100%" stop-color="#18181C"/>
    </linearGradient>
    <linearGradient id="shell" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D3D43"/>
      <stop offset="35%" stop-color="#2B2B31"/>
      <stop offset="100%" stop-color="#15151A"/>
    </linearGradient>
    <linearGradient id="display" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13131A"/>
      <stop offset="100%" stop-color="#09090E"/>
    </linearGradient>
    <linearGradient id="lightKey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4D4DB"/>
      <stop offset="100%" stop-color="#A7A7B3"/>
    </linearGradient>
    <linearGradient id="darkKey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A5A72"/>
      <stop offset="100%" stop-color="#323244"/>
    </linearGradient>
    <linearGradient id="orangeKey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD15A"/>
      <stop offset="100%" stop-color="#FF9F0A"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="8%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="184" y="184" width="656" height="656" rx="164" fill="url(#shell)"/>
    <ellipse cx="512" cy="258" rx="278" ry="122" fill="url(#topGlow)"/>

    <rect x="252" y="246" width="520" height="126" rx="34" fill="url(#display)"/>
    <g fill="#F5F5F7">
      <rect x="548" y="288" width="28" height="52" rx="14"/>
      <rect x="598" y="274" width="28" height="66" rx="14"/>
      <rect x="648" y="260" width="28" height="80" rx="14"/>
      <rect x="698" y="274" width="28" height="66" rx="14"/>
      <rect x="574" y="295" width="146" height="16" rx="8"/>
    </g>

    <g>
      <circle cx="316" cy="466" r="58" fill="url(#lightKey)"/>
      <circle cx="456" cy="466" r="58" fill="url(#lightKey)"/>
      <circle cx="596" cy="466" r="58" fill="url(#lightKey)"/>
      <circle cx="726" cy="466" r="62" fill="url(#orangeKey)"/>

      <circle cx="316" cy="606" r="58" fill="url(#darkKey)"/>
      <circle cx="456" cy="606" r="58" fill="url(#darkKey)"/>
      <circle cx="596" cy="606" r="58" fill="url(#darkKey)"/>
      <circle cx="726" cy="606" r="62" fill="url(#orangeKey)"/>

      <circle cx="316" cy="746" r="58" fill="url(#darkKey)"/>
      <circle cx="456" cy="746" r="58" fill="url(#darkKey)"/>
      <circle cx="596" cy="746" r="58" fill="url(#darkKey)"/>
      <circle cx="726" cy="746" r="62" fill="url(#orangeKey)"/>

      <rect x="258" y="830" width="256" height="84" rx="42" fill="url(#darkKey)"/>
      <circle cx="596" cy="872" r="42" fill="url(#darkKey)"/>
      <circle cx="726" cy="872" r="46" fill="url(#orangeKey)"/>
    </g>
  </g>
</svg>
